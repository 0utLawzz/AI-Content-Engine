kind = "web"
previewPath = "/"
title = "AI Content Engine"
version = "1.0.0"
id = "artifacts/content-engine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18298

[services.development]
run = "pnpm --filter @workspace/content-engine run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/content-engine", "run", "build" ]
publicDir = "artifacts/content-engine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18298"
BASE_PATH = "/"
